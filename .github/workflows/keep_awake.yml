name: Keep Hugging Face Space Awake

on:
  schedule:
    # Run every 12 hours to prevent the 48-hour inactivity sleep
    - cron: "0 */12 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake / Restart Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "⚠️  Missing HF_TOKEN, HF_USERNAME, or HF_SPACE_NAME secrets — skipping."
            exit 0
          fi

          # Step 1: Check the actual running app URL (not the space info page)
          APP_URL="https://${HF_USERNAME}-${HF_SPACE_NAME}.hf.space"
          echo "Checking app health at $APP_URL ..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL" || echo "000")
          echo "App HTTP status: $HTTP_STATUS"

          # Step 2: If the app is not responding, use the HF API to restart the space
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Space appears to be stopped (status=$HTTP_STATUS). Calling HF restart API..."
            RESTART_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $HF_TOKEN" \
              "https://huggingface.co/api/spaces/$HF_USERNAME/$HF_SPACE_NAME/restart")
            echo "Restart API response: $RESTART_STATUS"

            if [ "$RESTART_STATUS" = "200" ] || [ "$RESTART_STATUS" = "204" ]; then
              echo "✅ Restart triggered successfully."
            else
              echo "⚠️  Restart API returned status $RESTART_STATUS — manual check may be needed."
              exit 1
            fi
          else
            echo "✅ Space is alive and responding."
          fi
